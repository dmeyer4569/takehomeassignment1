<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title></title>
    <link href="css/layout.css" rel="stylesheet">
    <link href="css/cards.css" rel="stylesheet">
    <link href="css/sidebar.css" rel="stylesheet">
  </head>
  <body>
    <div class="container">
      <aside class="sidebar">
        <h2>Cars for Days</h2> 
        <h3>Price Range</h3>

        <div class="inputs">
          <input type="number" id="min-price" placeholder="Min $" min="0">
          <span>to</span>
          <input type="number" id="max-price" placeholder="Max $" min="0">
        </div>

        <h3>Mile Range</h3>
        <div class="inputs">
          <input type="number" id="min-mile" placeholder="Min Miles" min="0">
          <span>to</span>
          <input type="number" id="max-mile" placeholder="Max Miles" min="0">
        </div>

        <h3>Year Range</h3>
        <div class="inputs">
          <input type="number" id="min-year" placeholder="Min Year" min="0">
          <span>to</span> 
          <input type="number" id="max-year" placeholder="Max Year" min="0">
        </div>
        
        <h3>Manufacturers</h3>
        <div id="manufacturer-list"></div>
          
        <h3>Colors</h3>
        <div id="color-list"></div>
      

        <button id="apply-filter">Apply Filters</button>

      </aside>

      <main id="car-container" class="gallery">
      </main>
    </div>
    <script type="module" src="js/sidebarLists.js"></script>
    <script type="module" src="js/sidebar.js"></script>
    <script type="module" src="js/cars.js"></script>
  </body>
</html>
